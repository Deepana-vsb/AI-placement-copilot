<!-- Login Container -->
<main class="w-full max-w-[400px] mx-auto animate-in fade-in slide-in-from-bottom-4 duration-700 flex flex-col justify-center px-4">

</div>
<div class="relative">

<!-- Dynamic Motivation Message (Micro-interaction) -->

</main>
<script>
        // Micro-interaction: Change motivational text on a loop
        const quotes = [
            "Ready to crush your next technical round?",
            "Over 10,000 students placed this year.",
            "AI-powered mock interviews waiting for you.",
            "Track your progress, level up your career."
        ];
        let currentQuote = 0;
        const quoteEl = document.getElementById('motivational-quote');

        setInterval(() => {
            quoteEl.classList.add('opacity-0', 'transition-opacity', 'duration-500');
            setTimeout(() => {
                currentQuote = (currentQuote + 1) % quotes.length;
                quoteEl.textContent = quotes[currentQuote];
                quoteEl.classList.remove('opacity-0');
            }, 500);
        }, 5000);

        // Simple button interaction feedback
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('mousedown', () => btn.classList.add('scale-95'));
            btn.addEventListener('mouseup', () => btn.classList.remove('scale-95'));
            btn.addEventListener('mouseleave', () => btn.classList.remove('scale-95'));
        });
    </script>
