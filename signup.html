<body class="min-h-screen flex flex-col items-center justify-center p-md md:p-lg selection:bg-secondary-container">
<!-- Auth Container -->
<main class="w-full max-w-[440px] animate-in fade-in slide-in-from-bottom-4 duration-700">
<!-- Main Form Card -->
<div class="glass-card rounded-xl p-lg md:p-xl flex flex-col">
<!-- Brand Anchor -->
<div class="flex flex-col items-center mb-lg">
<div class="w-12 h-12 bg-primary-container text-on-primary rounded-xl flex items-center justify-center mb-md shadow-sm transition-transform hover:scale-110 duration-300">
<span class="material-symbols-outlined text-[28px]" data-icon="rocket_launch">rocket_launch</span>
</div>
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface text-center">Join Placement Copilot</h1>
<p class="font-body-md text-body-md text-on-surface-variant text-center mt-xs">Accelerate your career journey today</p>
</div>
<!-- Form -->
<form class="space-y-md" onsubmit="event.preventDefault();">
<!-- Full Name -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface block">Full Name</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors" data-icon="person">person</span>
<input class="w-full pl-10 pr-md py-3 bg-surface border border-outline-variant rounded-xl font-body-md text-body-md focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/10 transition-all placeholder:text-outline-variant" placeholder="John Doe" type="text"/>
</div>
</div>
<!-- College Email -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface block">College Email</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors" data-icon="mail">mail</span>
<input class="w-full pl-10 pr-md py-3 bg-surface border border-outline-variant rounded-xl font-body-md text-body-md focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/10 transition-all placeholder:text-outline-variant" placeholder="name@university.edu" type="email"/>
</div>
</div>
<!-- College Name -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface block">College Name</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors" data-icon="school">school</span>
<input class="w-full pl-10 pr-md py-3 bg-surface border border-outline-variant rounded-xl font-body-md text-body-md focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/10 transition-all placeholder:text-outline-variant" placeholder="Stanford University" type="text"/>
</div>
</div>
<!-- Branch & Year -->
<div class="grid grid-cols-2 gap-sm">
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface block">Branch</label>
<select class="w-full px-md py-3 bg-surface border border-outline-variant rounded-xl font-body-md text-body-md focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/10 transition-all appearance-none cursor-pointer">
<option>CS / IT</option>
<option>Mechanical</option>
<option>Electrical</option>
<option>Other</option>
</select>
</div>
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface block">Year</label>
<select class="w-full px-md py-3 bg-surface border border-outline-variant rounded-xl font-body-md text-body-md focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/10 transition-all appearance-none cursor-pointer">
<option>1st Year</option>
<option>2nd Year</option>
<option>3rd Year</option>
<option>4th Year</option>
</select>
</div>
</div>
<!-- Password -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface block">Password</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors" data-icon="lock">lock</span>
<input class="w-full pl-10 pr-12 py-3 bg-surface border border-outline-variant rounded-xl font-body-md text-body-md focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/10 transition-all placeholder:text-outline-variant" id="password-field" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors" onclick="togglePassword('password-field')" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Confirm Password -->
<div class="space-y-xs">

<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors" data-icon="lock">lock</span>

</div>

<p class="font-body-md text-body-md text-on-surface-variant">

<div class="inline-flex items-center gap-2 px-md py-2 bg-secondary-container/20 rounded-full border border-secondary-container/30 backdrop-blur-sm animate-pulse-slow">
<span class="material-symbols-outlined text-secondary text-[18px]" data-icon="stars" style="font-variation-settings: 'FILL' 1;">stars</span>
<span class="font-label-sm text-label-sm text-secondary">Join 10,000+ students preparing smarter</span>
</div>

<!-- Visual Background Element (Subtle) -->
<div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none opacity-40">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary-container rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-secondary-container rounded-full blur-[120px]"></div>
</div>
<script>
        function togglePassword(fieldId) {
            const passwordField = document.getElementById(fieldId);
            const button = event.currentTarget;
            const icon = button.querySelector('.material-symbols-outlined');
            
            if (passwordField.type === "password") {
                passwordField.type = "text";
                icon.innerText = "visibility_off";
            } else {
                passwordField.type = "password";
                icon.innerText = "visibility";
            }
        }

        // Add a subtle parallax effect to the card
        document.addEventListener('mousemove', (e) => {
            const card = document.querySelector('.glass-card');
            const rect = card.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const mouseX = e.clientX - centerX;
            const mouseY = e.clientY - centerY;
            
            const rotateX = mouseY * -0.005;
            const rotateY = mouseX * 0.005;
            
            card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        });
    </script>
</body></html>
