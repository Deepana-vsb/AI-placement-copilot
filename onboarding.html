<script>
        function selectRole(element) {
            // Remove existing selection from all cards
            const grid = document.getElementById('role-grid');
            const buttons = grid.querySelectorAll('button');
            
            buttons.forEach(btn => {
                btn.classList.remove('card-selected');
                btn.querySelector('.check-icon').classList.add('hidden');
                // Revert icon background
                const iconBox = btn.querySelector('.p-sm');
                iconBox.classList.remove('bg-secondary/10');
            });

            // Apply selection to clicked element
            element.classList.add('card-selected');
            element.querySelector('.check-icon').classList.remove('hidden');
            element.querySelector('.p-sm').classList.add('bg-secondary/10');

            // Enable Continue button
            const continueBtn = document.getElementById('continue-btn');
            continueBtn.disabled = false;
            
            // Interaction Feedback
            createRipple(event, element);
        }

        function createRipple(event, element) {
            const circle = document.createElement("span");
            const diameter = Math.max(element.clientWidth, element.clientHeight);
            const radius = diameter / 2;

            circle.style.width = circle.style.height = `${diameter}px`;
            circle.style.left = `${event.clientX - element.getBoundingClientRect().left - radius}px`;
            circle.style.top = `${event.clientY - element.getBoundingClientRect().top - radius}px`;
            circle.classList.add("ripple");

            const ripple = element.getElementsByClassName("ripple")[0];
            if (ripple) { ripple.remove(); }
            element.appendChild(circle);
        }

        // Add small inline styles for the ripple effect manually since tailwind won't handle dynamic keyframes as easily
        const style = document.createElement('style');
        style.innerHTML = `
            .ripple {
                position: absolute;
                border-radius: 50%;
                transform: scale(0);
                animation: ripple 600ms linear;
                background-color: rgba(0, 106, 97, 0.1);
                pointer-events: none;
            }
            @keyframes ripple {
                to {
                    transform: scale(4);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);
    </script>
